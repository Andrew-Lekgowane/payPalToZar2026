<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0d0a1f"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="topBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="stepCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- Orbs -->
  <circle cx="200" cy="300" r="320" fill="#7c3aed" fill-opacity="0.12"/>
  <circle cx="950" cy="1100" r="380" fill="#4f46e5" fill-opacity="0.09"/>
  <circle cx="900" cy="300" r="220" fill="#a855f7" fill-opacity="0.07"/>
  <circle cx="150" cy="1700" r="240" fill="#6366f1" fill-opacity="0.07"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1080" height="8" fill="url(#topBar)"/>

  <!-- LOGO ICON -->
  <rect x="466" y="90" width="148" height="148" rx="34" fill="url(#iconGrad)" filter="url(#glow)"/>
  <g transform="translate(489,104) scale(4.9)">
    <polygon points="13,2 3,14 12,14 11,22 21,10 12,10" fill="white"/>
  </g>

  <!-- Brand name -->
  <text x="540" y="296"
    font-family="'Segoe UI','SF Pro Display','Helvetica Neue',Arial,sans-serif"
    font-size="48" font-weight="700" fill="white" text-anchor="middle" letter-spacing="4">
    ANNATHAN PAY
  </text>
  <text x="540" y="340"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="26" fill="#a5b4fc" text-anchor="middle">
    South Africa's PayPal Withdrawal Service
  </text>

  <!-- Divider -->
  <line x1="300" y1="368" x2="780" y2="368" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- HEADLINE -->
  <text x="540" y="456"
    font-family="'Segoe UI','SF Pro Display','Helvetica Neue',Arial,sans-serif"
    font-size="84" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-2">
    Turn Your PayPal
  </text>
  <text x="540" y="550"
    font-family="'Segoe UI','SF Pro Display','Helvetica Neue',Arial,sans-serif"
    font-size="84" font-weight="900" fill="#a855f7" text-anchor="middle" letter-spacing="-2">
    Into Rands
  </text>
  <text x="540" y="608"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="32" fill="#c4b5fd" text-anchor="middle">
    Directly into your bank account
  </text>

  <!-- ===== 3 STEPS ===== -->
  <text x="540" y="688"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="30" font-weight="700" fill="#8b5cf6" text-anchor="middle" letter-spacing="3">
    HOW IT WORKS
  </text>

  <!-- STEP 1 -->
  <rect x="80" y="714" width="920" height="170" rx="28" fill="url(#stepCard)" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Step number circle -->
  <circle cx="160" cy="799" r="44" fill="#7c3aed"/>
  <text x="160" y="812"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="40" font-weight="900" fill="white" text-anchor="middle">1</text>
  <!-- Step text -->
  <text x="600" y="776"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="34" font-weight="700" fill="white" text-anchor="middle">
    Enter Your USD Amount
  </text>
  <text x="600" y="820"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="26" fill="#c4b5fd" text-anchor="middle">
    Type how much you want to convert
  </text>
  <text x="600" y="860"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="24" fill="#8b5cf6" text-anchor="middle">
    Min $5  ·  Max $100 per transaction
  </text>

  <!-- Connector -->
  <line x1="540" y1="884" x2="540" y2="926" stroke="#7c3aed" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="6,5"/>

  <!-- STEP 2 -->
  <rect x="80" y="926" width="920" height="170" rx="28" fill="url(#stepCard)" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="160" cy="1011" r="44" fill="#6366f1"/>
  <text x="160" y="1024"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="40" font-weight="900" fill="white" text-anchor="middle">2</text>
  <text x="600" y="988"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="34" font-weight="700" fill="white" text-anchor="middle">
    Send on PayPal
  </text>
  <text x="600" y="1032"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="26" fill="#c4b5fd" text-anchor="middle">
    Send the amount to our PayPal email
  </text>
  <text x="600" y="1076"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="24" fill="#a855f7" text-anchor="middle">
    payments@annathanpay.co.za
  </text>

  <!-- Connector -->
  <line x1="540" y1="1096" x2="540" y2="1138" stroke="#7c3aed" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="6,5"/>

  <!-- STEP 3 -->
  <rect x="80" y="1138" width="920" height="170" rx="28" fill="url(#stepCard)" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="160" cy="1223" r="44" fill="#10b981"/>
  <text x="160" y="1236"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="40" font-weight="900" fill="white" text-anchor="middle">3</text>
  <text x="600" y="1200"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="34" font-weight="700" fill="white" text-anchor="middle">
    Upload Screenshot &amp; Confirm
  </text>
  <text x="600" y="1244"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="26" fill="#c4b5fd" text-anchor="middle">
    Upload proof of your PayPal payment
  </text>
  <text x="600" y="1288"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="24" fill="#34d399" text-anchor="middle">
    Rands paid into your bank account!
  </text>

  <!-- CONVERSION EXAMPLE -->
  <rect x="80" y="1348" width="920" height="170" rx="28"
    fill="white" fill-opacity="0.04" stroke="#10b981" stroke-width="2" stroke-opacity="0.4"/>
  <text x="540" y="1392"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="26" fill="#34d399" text-anchor="middle" letter-spacing="2">
    EXAMPLE CONVERSION
  </text>

  <text x="260" y="1448"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="22" fill="#c4b5fd" text-anchor="middle">You send</text>
  <text x="260" y="1498"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="64" font-weight="900" fill="white" text-anchor="middle">$50</text>

  <text x="540" y="1490"
    font-family="Arial,sans-serif"
    font-size="54" fill="#7c3aed" text-anchor="middle">&#8594;</text>

  <text x="820" y="1448"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="22" fill="#c4b5fd" text-anchor="middle">You receive</text>
  <text x="820" y="1498"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="64" font-weight="900" fill="#34d399" text-anchor="middle">R601</text>

  <!-- CTA SECTION -->
  <text x="540" y="1588"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="30" fill="#c4b5fd" text-anchor="middle">
    Register now — it's free!
  </text>

  <rect x="160" y="1618" width="760" height="100" rx="50" fill="url(#btnGrad)"/>
  <text x="540" y="1678"
    font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="38" font-weight="800" fill="white" text-anchor="middle">
    Get Started Today &#8594;
  </text>

  <!-- Contact -->
  <text x="540" y="1762"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="28" fill="#8b5cf6" text-anchor="middle">
    payments@annathanpay.co.za
  </text>
  <text x="540" y="1800"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="24" fill="#6366f1" text-anchor="middle">
    Available to all South Africans with a PayPal account
  </text>

  <!-- Trust badges row -->
  <rect x="180" y="1836" width="200" height="52" rx="26" fill="white" fill-opacity="0.06" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.4"/>
  <text x="280" y="869"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="0" fill="#c4b5fd" text-anchor="middle"/>
  <text x="280" y="1869"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="22" fill="#c4b5fd" text-anchor="middle">&#9989; Secure</text>

  <rect x="440" y="1836" width="200" height="52" rx="26" fill="white" fill-opacity="0.06" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.4"/>
  <text x="540" y="1869"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="22" fill="#c4b5fd" text-anchor="middle">&#9989; Trusted</text>

  <rect x="700" y="1836" width="200" height="52" rx="26" fill="white" fill-opacity="0.06" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.4"/>
  <text x="800" y="1869"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="22" fill="#c4b5fd" text-anchor="middle">&#9989; Fast</text>

  <!-- Bottom bar -->
  <rect x="0" y="1912" width="1080" height="8" fill="url(#topBar)" opacity="0.6"/>
</svg>
